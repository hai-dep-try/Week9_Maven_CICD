# ============================================================
# ci-with-cache.yml – OPTIMIZED: Maven dependency caching
#
# Push #1 (CACHE MISS):  downloads all deps → saves to cache
# Push #2 (CACHE HIT) :  restores from cache → skips downloads
#
# How `cache: 'maven'` works in actions/setup-java:
#   1. Computes a cache key from the hash of all pom.xml files:
#      key = "setup-java-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}"
#   2. Before the build: tries to restore ~/.m2/repository from cache
#   3. After the build:  saves ~/.m2/repository back to cache
#      (only if the key was a MISS – avoids redundant saves)
#
# Expected timing (observed in GitHub Actions):
#   Push #1 – Cache MISS : ~120–180s (downloads + saves cache)
#   Push #2 – Cache HIT  : ~20–40s   (restores cache, no downloads)
#   Savings              : ~70–85% faster
# ============================================================

name: "[OPTIMIZED] CI With Maven Cache"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-with-cache:
    name: "Build (WITH cache) – push #${{ github.run_number }}"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Bai9_6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── THE KEY STEP: cache: 'maven' ──────────────────────
      - name: "Set up JDK 17 (WITH Maven cache)"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          #
          # This single parameter activates caching:
          # ┌─────────────────────────────────────────────────┐
          # │ Cache key generated:                            │
          # │  setup-java-Linux-maven-<hash of pom.xml>       │
          # │                                                 │
          # │ Push #1 → key NOT in cache → CACHE MISS        │
          # │   • ~/.m2/repository starts empty               │
          # │   • Maven downloads all deps                    │
          # │   • After build: ~/.m2 saved → cache            │
          # │   LOG: "Cache not found for input keys..."      │
          # │                                                 │
          # │ Push #2 → key FOUND in cache → CACHE HIT       │
          # │   • ~/.m2/repository restored from cache        │
          # │   • Maven finds all deps locally                │
          # │   • No network downloads needed                 │
          # │   LOG: "Cache restored from key:               │
          # │          setup-java-Linux-maven-<hash>"         │
          # └─────────────────────────────────────────────────┘

      # ── Record start time ────────────────────────────────
      - name: Record start time
        id: timer_start
        run: echo "START=$(date +%s)" >> $GITHUB_OUTPUT

      # ── Inspect ~/.m2 BEFORE build ───────────────────────
      # Push #1: empty (cache miss)
      # Push #2: populated (cache hit) – NO download lines in Maven log
      - name: "Inspect ~/.m2 BEFORE build (cache hit vs miss indicator)"
        run: |
          echo "===== ~/.m2/repository BEFORE build ====="
          if [ -d ~/.m2/repository ]; then
            BEFORE_COUNT=$(find ~/.m2/repository -name "*.jar" | wc -l)
            BEFORE_SIZE=$(du -sh ~/.m2/repository | cut -f1)
            echo "  JAR count : $BEFORE_COUNT"
            echo "  Size      : $BEFORE_SIZE"
            if [ "$BEFORE_COUNT" -gt "10" ]; then
              echo ""
              echo "  >>> CACHE HIT detected!"
              echo "  >>> $BEFORE_COUNT JARs already present in ~/.m2"
              echo "  >>> Maven will NOT download these from Maven Central."
            else
              echo ""
              echo "  >>> CACHE MISS – ~/.m2 is empty or near-empty."
              echo "  >>> Maven will download all dependencies."
              echo "  >>> After this run, they will be saved to cache."
            fi
          else
            echo "  ~/.m2/repository does not exist → CACHE MISS (first run)"
          fi

      # ── Run build ────────────────────────────────────────
      # On cache HIT: you will NOT see "Downloading from central:" lines
      # On cache MISS: you WILL see many "Downloading from central:" lines
      - name: "mvn verify"
        run: |
          echo ">>> Starting Maven build. Watch for 'Downloading from central:' lines."
          echo ">>> CACHE HIT = no download lines. CACHE MISS = many download lines."
          mvn verify -B

      # ── Inspect ~/.m2 AFTER build ────────────────────────
      - name: "Inspect ~/.m2 AFTER build (confirm cache contents)"
        if: always()
        run: |
          echo "===== ~/.m2/repository AFTER build ====="
          AFTER_COUNT=$(find ~/.m2/repository -name "*.jar" | wc -l)
          AFTER_SIZE=$(du -sh ~/.m2/repository | cut -f1)
          echo "  JAR count : $AFTER_COUNT"
          echo "  Size      : $AFTER_SIZE"
          echo ""
          echo "  Key JARs verified in local cache:"
          for dep in "slf4j-api" "logback-classic" "junit-jupiter" "jacoco"; do
            FOUND=$(find ~/.m2/repository -name "${dep}*.jar" | head -1)
            if [ -n "$FOUND" ]; then
              echo "    [OK] $dep → $(basename $FOUND)"
            else
              echo "    [?]  $dep not found in ~/.m2"
            fi
          done

      # ── Analyze Maven log for cache evidence ─────────────
      - name: "Analyze: count 'Downloading' lines (cache hit = 0 lines)"
        if: always()
        run: |
          echo "===== Cache Hit Evidence Analysis ====="
          echo ""
          echo "Re-run build with detailed output to count download lines..."
          # Run a quick dependency check and capture output
          DOWNLOAD_COUNT=$(mvn dependency:resolve -B 2>&1 | grep -c "Downloading from central:" || true)
          echo "  'Downloading from central:' occurrences: $DOWNLOAD_COUNT"
          echo ""
          if [ "$DOWNLOAD_COUNT" -eq "0" ]; then
            echo "  >>> CONFIRMED CACHE HIT!"
            echo "  >>> Zero downloads from Maven Central."
            echo "  >>> All dependencies served from local ~/.m2 (restored from cache)."
          else
            echo "  >>> Cache MISS or PARTIAL hit: $DOWNLOAD_COUNT downloads occurred."
            echo "  >>> These will be cached for the NEXT run."
          fi

      # ── Record end time ───────────────────────────────────
      - name: Calculate and record build duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer_start.outputs.START }}
          DURATION=$((END - START))
          echo "====================================="
          echo "  [WITH CACHE] Build duration: ${DURATION}s"
          echo "  Run number : ${{ github.run_number }}"
          echo "====================================="
          # Determine cache status from ~/.m2 size before build
          # (approximation – actual status is in setup-java step output)
          echo "## [WITH CACHE] Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build time | **${DURATION} seconds** |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache key | \`setup-java-Linux-maven-${{ hashFiles('**/pom.xml') }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to read cache status in logs" >> $GITHUB_STEP_SUMMARY
          echo "Look at the **'Set up JDK 17'** step output:" >> $GITHUB_STEP_SUMMARY
          echo "- \`Cache restored from key: setup-java-Linux-maven-...\` = **HIT**" >> $GITHUB_STEP_SUMMARY
          echo "- \`Cache not found for input keys: setup-java-Linux-maven-...\` = **MISS**" >> $GITHUB_STEP_SUMMARY

      # ── Upload JaCoCo report ──────────────────────────────
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "jacoco-report-run${{ github.run_number }}"
          path: Bai9_6/target/site/jacoco/
          retention-days: 14
