# ============================================================
# ci.yml – FIXED workflow (after correcting Bug 3)
#
# BUG 3 FIX: Added `actions/checkout@v4` as the FIRST step.
#
# BROKEN original:
#   steps:
#     - name: Set up JDK 17          ← no checkout before this!
#       uses: actions/setup-java@v3
#     - name: Build with Maven
#       run: mvn package              ← no pom.xml exists on runner!
#
# ERROR LOG from GitHub Actions:
#   Run mvn package
#   /home/runner/work/_temp/...: line 1: mvn: command not found
#   OR (if maven is available but no pom.xml):
#   [ERROR] The goal you specified requires a project to execute
#           but there is no POM in this directory
#           (/home/runner/work/shipping-app/shipping-app).
#   Please verify you invoked Maven from the correct directory.
#   Error: Process completed with exit code 1.
#
# REASON: GitHub Actions runners start with an EMPTY workspace.
# The source code only appears after `actions/checkout` clones the repo.
# Every workflow that needs source code MUST have checkout as step 1.
# ============================================================

name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── BUG 3 FIX: checkout MUST be step 1 ───────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        # Without this step, the runner workspace is empty.
        # mvn package fails immediately: "No POM in this directory".

      # ── Set up JDK (also updated to setup-java@v4) ───────
      - name: Set up JDK 17
        uses: actions/setup-java@v4     # updated: v3 → v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'               # cache ~/.m2 for faster subsequent runs

      # ── Build and test ────────────────────────────────────
      - name: Build with Maven
        run: mvn clean package -B -f Bai9_10/pom.xml
        # -B = batch mode (no color, clean CI logs)
        # clean package runs: compile → test → package

      # ── Upload test reports ───────────────────────────────
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: Bai9_10/target/surefire-reports/
          retention-days: 7
